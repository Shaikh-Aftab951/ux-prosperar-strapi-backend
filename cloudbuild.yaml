steps:
# 1. Build and Tag (using the built-in $SHORT_SHA variable)
- name: 'gcr.io/cloud-builders/docker'
  id: 'build'
  args:
  - 'build'
  - '-t'
  - '$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:${SHORT_SHA}'
  - '-t'
  - '$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:latest'
  - '-f'
  - 'Dockerfile'
  - '.'

# 2. Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - '$_SERVICE_NAME'
  - '--image'
  - '$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:${SHORT_SHA}'
  - '--region'
  - '$_REGION'

# This pushes all tags listed in the build step to Artifact Registry
images:
- '$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:${SHORT_SHA}'
- '$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY