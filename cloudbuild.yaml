steps:
- name: 'gcr.io/cloud-builders/git'
  args: ['describe', '--tags', '--always']
  id: 'get-git-commit-sha'
  waitFor: ['-']

- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  id: 'build-and-push-docker-image'
  args:
  - '-c'
  - |
    SHORT_SHA=$(git rev-parse --short HEAD)
    docker build -t $_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:$SHORT_SHA -f Dockerfile .
    docker push $_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:$SHORT_SHA

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - '$_SERVICE_NAME'
  - '--image'
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:$SHORT_SHA"
  - '--region'
  - '$_REGION'

images:
- '$_REGION-docker.pkg.dev/$_PROJECT_ID/$_APPLICATION_NAME/$_APPLICATION_NAME:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY